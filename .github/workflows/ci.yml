name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (light deps — rembg/onnxruntime not needed for tests)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow scipy pytest ruff
          pip install -e . --no-deps

      - name: Lint
        run: ruff check jammsprite tests

      - name: Test
        run: pytest

      - name: CLI smoke test
        run: |
          jammsprite --version
          jammsprite --help > /dev/null

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JAMMSPRITE player</title>
<style>
  :root { --fg:#7cffb2; --bg:#070b09; --panel:#0d1410; --line:#1e3c2d; --dim:#5a8a70; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--fg);
         font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
         display:flex; flex-direction:column; align-items:center; gap:16px; padding:24px; }
  h1 { font-size:18px; letter-spacing:2px; margin:0; }
  h1 span { color:var(--dim); }
  #drop { border:2px dashed var(--line); border-radius:10px; padding:28px 40px; text-align:center;
          cursor:pointer; transition:border-color .15s, background .15s; }
  #drop.hover { border-color:var(--fg); background:var(--panel); }
  #drop input { display:none; }
  #controls { display:none; flex-wrap:wrap; gap:10px 18px; align-items:center; justify-content:center;
              background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 16px; }
  #controls label { display:flex; align-items:center; gap:6px; color:var(--dim); }
  select,button { background:var(--bg); color:var(--fg); border:1px solid var(--line);
                  border-radius:6px; padding:4px 10px; font:inherit; cursor:pointer; }
  button:hover,select:hover { border-color:var(--fg); }
  input[type=range] { accent-color:var(--fg); }
  input[type=color] { width:34px; height:24px; border:1px solid var(--line); border-radius:6px;
                      background:var(--bg); padding:1px; cursor:pointer; }
  #stage { display:none; border:1px solid var(--line); border-radius:10px; background:var(--bg);
           max-width:96vw; overflow:auto; }
  canvas { display:block; image-rendering:pixelated; max-width:92vw; height:auto; }
  #meta { color:var(--dim); font-size:12px; }
  a { color:var(--fg); }
</style>
</head>
<body>
  <h1>JAMMSPRITE <span>// sprite player</span></h1>

  <div id="drop">
    <strong>Drop a <code>*.frames.json</code> here</strong><br>
    <span style="color:var(--dim)">or click to choose a file — made with
    <a href="https://github.com/JAMMx2/JAMMSPRITE">JAMMSPRITE</a></span>
    <input type="file" id="file" accept=".json,application/json">
  </div>

  <div id="controls">
    <label>anim <select id="anim"></select></label>
    <button id="toggle">pause</button>
    <label>fps <input type="range" id="fps" min="1" max="30" value="8" step="1"><span id="fpsv">8</span></label>
    <label><input type="checkbox" id="flip"> flip</label>
    <label><input type="checkbox" id="colored"> full colour</label>
    <label>tint <input type="color" id="tint" value="#7cffb2"></label>
  </div>

  <div id="stage"><canvas id="cv"></canvas></div>
  <div id="meta"></div>

<script>
(() => {
  const CW = 7, CH = 13, FONT = "12px ui-monospace,Menlo,Consolas,monospace";
  const $ = id => document.getElementById(id);
  const drop = $("drop"), stage = $("stage"), cv = $("cv"), ctx = cv.getContext("2d");

  let data = null, frames = [], pre = [], idx = 0, playing = true, last = 0, acc = 0;

  function prerender() {
    if (!frames.length) return;
    const flip = $("flip").checked, colored = $("colored").checked, tint = $("tint").value;
    const W = frames[0].chars[0].length, H = frames[0].chars.length;
    pre = frames.map(fr => {
      const oc = document.createElement("canvas");
      oc.width = W * CW; oc.height = H * CH;
      const c = oc.getContext("2d");
      c.font = FONT; c.textBaseline = "top";
      c.fillStyle = tint;
      for (let y = 0; y < H; y++) {
        const row = flip ? [...fr.chars[y]].reverse().join("") : fr.chars[y];
        const cols = flip ? [...fr.colors[y]].reverse() : fr.colors[y];
        for (let x = 0; x < row.length; x++) {
          const ch = row[x];
          if (ch === " ") continue;
          if (colored && cols && cols[x]) c.fillStyle = "rgb(" + cols[x] + ")";
          else c.fillStyle = tint;
          c.fillText(ch, x * CW, y * CH);
        }
      }
      return oc;
    });
    cv.width = W * CW; cv.height = H * CH;
    idx = Math.min(idx, pre.length - 1);
    draw();
    $("meta").textContent = `${pre.length} frames @ ${W}x${H} glyphs`;
  }

  function draw() {
    ctx.fillStyle = "#070b09";
    ctx.fillRect(0, 0, cv.width, cv.height);
    if (pre[idx]) ctx.drawImage(pre[idx], 0, 0);
  }

  function tick(t) {
    requestAnimationFrame(tick);
    if (!playing || !pre.length) { last = t; return; }
    acc += t - last; last = t;
    const step = 1000 / +$("fps").value;
    while (acc >= step) { acc -= step; idx = (idx + 1) % pre.length; }
    draw();
  }

  function load(json) {
    data = json;
    const names = Object.keys(data).filter(k => Array.isArray(data[k]));
    if (!names.length) { alert("No animations found in that JSON."); return; }
    $("anim").innerHTML = names.map(n => `<option>${n}</option>`).join("");
    pick(names[0]);
    drop.style.display = "none";
    $("controls").style.display = "flex";
    stage.style.display = "block";
  }

  function pick(name) {
    frames = data[name]; idx = 0; prerender();
  }

  function readFile(f) {
    const r = new FileReader();
    r.onload = () => { try { load(JSON.parse(r.result)); } catch { alert("Not valid JSON."); } };
    r.readAsText(f);
  }

  drop.addEventListener("click", () => $("file").click());
  $("file").addEventListener("change", e => e.target.files[0] && readFile(e.target.files[0]));
  ["dragover", "dragleave", "drop"].forEach(ev =>
    drop.addEventListener(ev, e => {
      e.preventDefault();
      drop.classList.toggle("hover", ev === "dragover");
      if (ev === "drop" && e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
    }));

  $("anim").addEventListener("change", e => pick(e.target.value));
  $("toggle").addEventListener("click", () => { playing = !playing; $("toggle").textContent = playing ? "pause" : "play"; });
  $("fps").addEventListener("input", () => $("fpsv").textContent = $("fps").value);
  ["flip", "colored", "tint"].forEach(id => $(id).addEventListener("input", prerender));

  requestAnimationFrame(t => { last = t; requestAnimationFrame(tick); });
})();
</script>
</body>
</html>
